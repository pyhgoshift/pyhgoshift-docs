<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PYHGOSHIFT Docs</title>
  <meta name="description" content="PYHGOSHIFT 구축 기록 및 운영 문서">
  <link rel="icon" href="https://www.pyhgoshift.com/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #2c3e50;
      --sidebar-width: 280px;
    }
    .sidebar .sidebar-nav li a {
      font-size: 14px;
    }
    .markdown-section h1:first-child {
      font-size: 2rem;
      color: #2c3e50;
    }
  </style>
</head>
<body>
  <div id="app">로딩 중...</div>

  <script>
    window.$docsify = {
      name: 'PYHGOSHIFT',
      repo: 'https://github.com/pyhgoshift/pyhgoshift-docs',
      homepage: 'README.md',
      loadSidebar: '_sidebar.md',
      loadNavbar: '_navbar.md',
      subMaxLevel: 2,
      auto2top: true,
      search: {
        placeholder: '검색...',
        noData: '결과 없음'
      },
      plugins: []
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
</body>
</html>
